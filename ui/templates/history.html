<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - Car Logger</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">🚗 Car Logger</div>
    <div class="topbar-right" role="status" aria-label="System status">
      <span class="indicator" id="h-indicator-queue" style="display:none"><span aria-hidden="true">📨</span> <span></span></span>
      <span class="indicator" id="h-indicator-ai">🤖 <span>--</span></span>
      <a href="/queue" class="btn-icon" aria-label="AI Queue">📋</a>
      <a href="/" class="btn-icon">⌂</a>
    </div>
  </header>

    <main class="history-page">
    <div class="history-header">
      <h1><a href="/" class="back-link">←</a> Detection History</h1>
      <span class="history-count" id="history-count"></span>
    </div>
    <div class="filter-bar">
      <button class="btn filter-btn active" data-filter="">All</button>
      <button class="btn filter-btn" data-filter="car">🚗 Cars</button>
      <button class="btn filter-btn" data-filter="non_car">🚫 Non-cars</button>
      <button class="btn filter-btn" data-filter="error">⚠ Errors</button>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by plate number..." class="input" style="flex:1" list="plate-list" autocomplete="off">
      <datalist id="plate-list"></datalist>
      <button class="btn primary" id="btn-search">Search</button>
      <button class="btn" id="btn-refresh">Refresh</button>
      <button class="btn" id="btn-export">Export CSV</button>
      <button class="btn clear-filters" id="btn-clear-filters">Clear filters</button>
    </div>
    <div class="history-table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" id="select-all" aria-label="Select all"></th>
            <th>Result</th>
            <th>Plate</th>
            <th>Time</th>
            <th>Vehicle</th>
            <th>Location</th>
            <th>Snap</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
    <div id="history-footer" class="history-footer">
      <button class="btn" id="btn-load-more" style="display:none">Load more</button>
      <button class="btn btn-danger" id="btn-delete-selected" style="display:none">Delete selected</button>
      <button class="btn btn-danger" id="btn-wipe">Wipe all</button>
      <div class="history-loading" id="history-loading">Loading...</div>
    </div>
  </main>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/status-poll.js"></script>
<script src="/static/js/pages/history.js"></script>
</body>
</html>
