<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Car Logger</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">🚗 Car Logger</div>
    <div class="topbar-right">
      <a href="/" class="btn-icon">⌂</a>
    </div>
  </header>

  <div class="settings-page">
    <h1>⚙ Settings</h1>

    <section class="settings-group">
      <h3>OpenRouter AI</h3>
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="sk-or-v1-..." class="input">
      <label>Model</label>
      <select id="model" class="input">
        <option value="meta-llama/llama-3.2-11b-vision-instruct:free">Llama 3.2 Vision (free)</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini (paid)</option>
        <option value="openai/gpt-4o">GPT-4o (paid)</option>
        <option value="qwen/qwen-vl-plus:free">Qwen VL Plus (free)</option>
      </select>
    </section>

    <section class="settings-group">
      <h3>Detection</h3>
      <label>Sensitivity</label>
      <input type="range" id="sensitivity" min="10" max="100" value="50" class="slider">
      <label>Min Car Size</label>
      <input type="number" id="min-car-area" class="input" style="width:100px">
      <label>Dedup Window (seconds)</label>
      <input type="number" id="dedup-seconds" class="input" style="width:100px">
      <label>Resolution</label>
      <select id="resolution" class="input">
        <option value="640,480">640x480 (Low, battery)</option>
        <option value="720,480" selected>720x480 (Default)</option>
        <option value="1280,720">1280x720 (HD)</option>
      </select>
    </section>

    <section class="settings-group">
      <h3>Location</h3>
      <label><input type="checkbox" id="location-auto" checked> Auto (WiFi)</label>
      <div id="manual-loc" style="display:none">
        <label>Latitude</label>
        <input type="number" step="any" id="loc-lat" class="input" style="width:180px">
        <label>Longitude</label>
        <input type="number" step="any" id="loc-lon" class="input" style="width:180px">
      </div>
    </section>

    <section class="settings-group">
      <h3>Server</h3>
      <label>Port</label>
      <input type="number" id="server-port" class="input" style="width:100px">
    </section>

    <div class="settings-actions">
      <button class="btn primary" id="btn-save">💾 Save</button>
      <span id="save-msg" class="save-msg"></span>
    </div>
  </div>
</div>

<script>
async function loadConfig() {
  const r = await fetch("/api/config");
  const cfg = await r.json();
  document.getElementById("api-key").value = cfg.openrouter_api_key || "";
  document.getElementById("model").value = cfg.openrouter_model;
  document.getElementById("sensitivity").value = cfg.sensitivity;
  document.getElementById("min-car-area").value = cfg.min_car_area;
  document.getElementById("dedup-seconds").value = cfg.dedup_seconds;
  document.getElementById("resolution").value = cfg.resolution.join(",");
  document.getElementById("location-auto").checked = cfg.location_auto;
  document.getElementById("loc-lat").value = cfg.location_lat;
  document.getElementById("loc-lon").value = cfg.location_lon;
  document.getElementById("server-port").value = cfg.server_port;
  toggleManualLoc();
}

function toggleManualLoc() {
  document.getElementById("manual-loc").style.display =
    document.getElementById("location-auto").checked ? "none" : "block";
}

document.getElementById("location-auto").addEventListener("change", toggleManualLoc);

document.getElementById("btn-save").addEventListener("click", async () => {
  const body = {
    openrouter_api_key: document.getElementById("api-key").value,
    openrouter_model: document.getElementById("model").value,
    sensitivity: parseInt(document.getElementById("sensitivity").value),
    min_car_area: parseInt(document.getElementById("min-car-area").value),
    dedup_seconds: parseInt(document.getElementById("dedup-seconds").value),
    resolution: document.getElementById("resolution").value.split(",").map(Number),
    location_auto: document.getElementById("location-auto").checked,
    location_lat: parseFloat(document.getElementById("loc-lat").value) || 0,
    location_lon: parseFloat(document.getElementById("loc-lon").value) || 0,
    server_port: parseInt(document.getElementById("server-port").value),
  };
  const r = await fetch("/api/config", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
  const msg = document.getElementById("save-msg");
  if (r.ok) {
    msg.textContent = "✅ Saved!";
    msg.style.color = "#4ade80";
  } else {
    msg.textContent = "❌ Failed";
    msg.style.color = "#f87171";
  }
  setTimeout(() => msg.textContent = "", 3000);
});

loadConfig();
</script>
</body>
</html>
