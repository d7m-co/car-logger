<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Queue - Car Logger</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">🚗 Car Logger</div>
    <div class="topbar-right" role="status" aria-label="System status">
      <span class="indicator" id="h-indicator-queue" style="display:none"><span aria-hidden="true">📨</span> <span></span></span>
      <span class="indicator" id="h-indicator-ai">🤖 <span>--</span></span>
      <a href="/" class="btn-icon">⌂</a>
    </div>
  </header>
  <main class="queue-page">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h1 style="margin:0">AI Queue</h1>
      <span style="color:#888;font-size:13px" id="q-last-refresh">polling...</span>
    </div>
    <div class="qstats" role="status" aria-label="Queue statistics">
      <span class="qstat-label">📨 queued: <em id="qs-queued">0</em></span>
      <span class="qstat-label">🔄 processing: <em id="qs-processing">0</em></span>
      <span class="qstat-label">✅ completed: <em id="qs-done">0</em></span>
      <span class="qstat-label">❌ errors: <em id="qs-errs">0</em></span>
      <span class="qstat-label">🔄 retrying: <em id="qs-retrying">0</em></span>
      <span class="qstat-label">⏭ skipped: <em id="qs-skipped">0</em></span>
      <span class="qstat-label">⚡ speed: <em id="qs-speed">--</em></span>
    </div>
    <div class="term" id="term"></div>
  </main>
</div>
<script src="/static/js/utils.js"></script>
<script src="/static/js/status-poll.js"></script>
<script src="/static/js/pages/queue.js"></script>
</body>
</html>
